  <rect x="58" y="46" width="8" height="8" rx="1.5" fill="white" />
  <rect x="70" y="46" width="8" height="8" rx="1.5" fill="white" />
  <rect x="46" y="58" width="8" height="8" rx="1.5" fill="white" />
